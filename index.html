<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WBC Challenge 2026</title>
<style>
  :root {
    --grass-dark: #1a4a1a;
    --grass-mid: #2d6e2d;
    --grass-light: #3a8a3a;
    --dirt: #8b5e3c;
    --dirt-light: #c4895f;
    --chalk: #f5f0e8;
    --chalk-dim: #c8bfab;
    --gold: #f5c518;
    --red: #cc2200;
    --white: #f5f0e8;
    --card-bg: rgba(10, 30, 10, 0.82);
    --card-border: rgba(60, 120, 60, 0.5);
    --green-bright: #4ade80;
    --muted: #7a9e7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background-color: var(--grass-dark);
    /* Diagonal mow-pattern stripes */
    background-image:
      repeating-linear-gradient(
        135deg,
        transparent,
        transparent 40px,
        rgba(0,0,0,0.08) 40px,
        rgba(0,0,0,0.08) 80px
      ),
      linear-gradient(180deg, #1a4a1a 0%, #1e521e 50%, #1a4a1a 100%);
    min-height: 100vh;
    color: var(--white);
  }

  /* ── Header ── */
  header {
    background: linear-gradient(180deg, #0a1f0a 0%, #142814 100%);
    border-bottom: 3px solid var(--dirt);
    padding: 0;
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .baseball-icon {
    width: 52px;
    height: 52px;
    flex-shrink: 0;
  }

  .header-title { flex: 1; }

  header h1 {
    font-size: 1.9rem;
    font-weight: 900;
    color: var(--chalk);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 2px 2px 0 #0a1f0a, 0 0 20px rgba(245,197,24,0.3);
  }

  .header-sub {
    display: flex;
    gap: 16px;
    align-items: center;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .header-tag {
    font-size: 0.75rem;
    color: var(--dirt-light);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }

  .header-tag + .header-tag::before {
    content: '·';
    margin-right: 16px;
    color: var(--muted);
  }

  .update-info {
    font-size: 0.75rem;
    color: var(--muted);
    text-align: right;
    line-height: 1.6;
  }

  /* ── Main ── */
  main {
    padding: 20px 24px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── Card base ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    backdrop-filter: blur(4px);
    overflow: hidden;
    margin-bottom: 16px;
  }

  .card-header {
    background: linear-gradient(90deg, rgba(0,0,0,0.5), rgba(0,0,0,0.2));
    border-bottom: 1px solid var(--card-border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label {
    font-size: 0.68rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--dirt-light);
  }

  /* ── Scoreboard / Leaderboard ── */
  .leaderboard .card-header { border-bottom-color: rgba(139,94,60,0.4); }

  .leader-grid {
    padding: 14px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(125px, 1fr));
    gap: 10px;
  }

  .leader-card {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(60,120,60,0.3);
    border-radius: 8px;
    padding: 12px 8px;
    text-align: center;
    position: relative;
    transition: transform 0.15s, border-color 0.15s;
  }

  .leader-card:hover { transform: translateY(-3px); }

  .leader-card.rank-1 {
    border-color: var(--gold);
    background: rgba(40,30,0,0.7);
    box-shadow: 0 0 14px rgba(245,197,24,0.25);
  }
  .leader-card.rank-2 {
    border-color: #a8b2c1;
    background: rgba(20,28,36,0.7);
  }
  .leader-card.rank-3 {
    border-color: var(--dirt-light);
    background: rgba(30,18,8,0.7);
  }

  .rank-badge { font-size: 1.2rem; display: block; margin-bottom: 2px; }
  .leader-name { font-weight: 700; font-size: 0.88rem; color: var(--chalk); }
  .leader-pts { font-size: 1.7rem; font-weight: 900; color: var(--green-bright); line-height: 1.1; margin: 3px 0 1px; }
  .leader-pts-label { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  /* ── Scoring key ── */
  .scoring-key {
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .score-items { display: flex; gap: 10px; flex-wrap: wrap; }

  .score-item {
    font-size: 0.75rem;
    color: var(--chalk-dim);
    background: rgba(0,0,0,0.3);
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .score-item strong { color: var(--gold); font-weight: 700; }

  /* ── Country sections ── */
  .country-section { }

  .country-header {
    background: linear-gradient(90deg, rgba(0,0,0,0.55), rgba(0,0,0,0.25));
  }

  .country-flag { font-size: 1.3rem; }

  .country-name {
    font-size: 0.9rem;
    font-weight: 800;
    color: var(--chalk);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── Table ── */
  .country-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.81rem;
  }

  .country-table thead tr {
    background: rgba(0,0,0,0.4);
    border-bottom: 1px solid var(--card-border);
  }

  .country-table th {
    padding: 5px 10px;
    text-align: center;
    color: var(--dirt-light);
    font-weight: 700;
    text-transform: uppercase;
    font-size: 0.62rem;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .country-table th:first-child,
  .country-table th:nth-child(2) { text-align: left; }

  .country-table tbody tr {
    border-bottom: 1px solid rgba(60,100,60,0.15);
    transition: background 0.1s;
  }

  .country-table tbody tr:last-child { border-bottom: none; }
  .country-table tbody tr:hover { background: rgba(60,120,60,0.12); }

  .country-table td {
    padding: 7px 10px;
    text-align: center;
    white-space: nowrap;
  }

  .country-table td:first-child { text-align: left; }
  .country-table td:nth-child(2) {
    text-align: left;
    color: var(--chalk-dim);
    font-style: italic;
    font-size: 0.78rem;
  }

  .participant-name { font-weight: 700; color: var(--chalk); }

  .stat-val { color: rgba(245,240,232,0.6); }
  .stat-val.hi { color: #86efac; font-weight: 600; }

  .pts-cell { font-weight: 800; color: var(--green-bright); font-size: 0.88rem; }
  .pts-cell.zero { color: var(--muted); font-weight: 400; }

  /* ── Chalk line decoration on leaderboard ── */
  .chalk-line {
    height: 2px;
    background: repeating-linear-gradient(90deg, var(--chalk-dim) 0, var(--chalk-dim) 6px, transparent 6px, transparent 14px);
    opacity: 0.2;
    margin: 0 16px;
  }

  .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 1rem; }

  @media (max-width: 600px) {
    header h1 { font-size: 1.3rem; }
    .country-table { font-size: 0.72rem; }
    .country-table th, .country-table td { padding: 5px 5px; }
    main { padding: 10px; }
    .leader-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <!-- Simple SVG baseball -->
    <svg class="baseball-icon" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="26" cy="26" r="24" fill="#f5f0e8" stroke="#ccc" stroke-width="1"/>
      <!-- Stitching left -->
      <path d="M14 12 C10 16, 10 20, 12 26 C10 32, 10 36, 14 40" stroke="#cc2200" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M11 15 L14 12 M11 23 L14 20 M11 29 L14 32 M11 37 L14 40" stroke="#cc2200" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- Stitching right -->
      <path d="M38 12 C42 16, 42 20, 40 26 C42 32, 42 36, 38 40" stroke="#cc2200" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M41 15 L38 12 M41 23 L38 20 M41 29 L38 32 M41 37 L38 40" stroke="#cc2200" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </svg>

    <div class="header-title">
      <h1>WBC Challenge 2026</h1>
      <div class="header-sub">
        <span class="header-tag">World Baseball Classic</span>
        <span class="header-tag">$25 Entry</span>
        <span class="header-tag">Pick One Player Per Country</span>
      </div>
    </div>

    <div class="update-info">
      <div id="last-updated">Loading…</div>
      <div>Updates nightly · 10pm CST</div>
    </div>
  </div>
</header>

<main>
  <div id="content" class="loading">Loading stats…</div>
</main>

<script>
const PICKS = {
  participants: ["Randy","Jody","Matt W","Josh","Mike","Bryan","Sal","Ben"],
  scoring: { walks:1, singles:1, doubles:2, triples:3, homeRuns:4, rbi:1, runs:1 },
  countries: [
    { name:"USA", flag:"🇺🇸", picks:{ Randy:"Bryce Harper", Jody:"Cal Raleigh", "Matt W":"Aaron Judge", Josh:"Cal Raleigh", Mike:"Kyle Schwarber", Bryan:"Aaron Judge", Sal:"Aaron Judge", Ben:"Aaron Judge" }},
    { name:"Australia", flag:"🇦🇺", picks:{ Randy:"Travis Bazzana", Jody:"Curtis Mead", "Matt W":"Travis Bazzana", Josh:"Chris Burke", Mike:"Curtis Mead", Bryan:"Travis Bazzana", Sal:"Travis Bazzana", Ben:"Curtis Mead" }},
    { name:"Brazil", flag:"🇧🇷", picks:{ Randy:"Dante Bichette Jr", Jody:"Lucas Ramirez", "Matt W":"Lucas Ramirez", Josh:"Dante Bichette Jr", Mike:"Leonardo Reginatto", Bryan:"Lucas Ramirez", Sal:"Dante Bichette Jr", Ben:"Dante Bichette Jr" }},
    { name:"Canada", flag:"🇨🇦", picks:{ Randy:"Josh Naylor", Jody:"Owen Caissie", "Matt W":"Josh Naylor", Josh:"Bo Naylor", Mike:"Tyler O'Neil", Bryan:"Josh Naylor", Sal:"Josh Naylor", Ben:"Josh Naylor" }},
    { name:"Chinese Taipei", flag:"🇹🇼", picks:{ Randy:"Yu Chang", Jody:"Yu Chang", "Matt W":"Chieh-Hsien Chen", Josh:"Chen-Wei Chen", Mike:"Yu Chang", Bryan:"Chieh-Hsien Chen", Sal:"Yu Chang", Ben:"Yu Chang" }},
    { name:"Colombia", flag:"🇨🇴", picks:{ Randy:"Gio Urshela", Jody:"Michael Arroyo", "Matt W":"Gio Urshela", Josh:"Michael Arroyo", Mike:"Michael Arroyo", Bryan:"Michael Arroyo", Sal:"Gio Urshela", Ben:"Jordan Diaz" }},
    { name:"Cuba", flag:"🇨🇺", picks:{ Randy:"Yoan Moncada", Jody:"Yoan Moncada", "Matt W":"Yoan Moncada", Josh:"Ariel Martinez", Mike:"Yoelkis Guibert", Bryan:"Yoan Moncada", Sal:"Yoan Moncada", Ben:"Yoan Moncada" }},
    { name:"Czech Republic", flag:"🇨🇿", picks:{ Randy:"Martin Muzik", Jody:"Marek Chlup", "Matt W":"Marek Chlup", Josh:"Max Prejda", Mike:"Martin Muzik", Bryan:"Martin Cervenka", Sal:"Martin Cervenka", Ben:"Martin Cervenka" }},
    { name:"Dominican Republic", flag:"🇩🇴", picks:{ Randy:"Junior Caminero", Jody:"Julio Rodriguez", "Matt W":"Vladimir Guerrero Jr.", Josh:"Manny Machado", Mike:"Oneil Cruz", Bryan:"Juan Soto", Sal:"Juan Soto", Ben:"Juan Soto" }},
    { name:"Great Britain", flag:"🇬🇧", picks:{ Randy:"Jazz Chisholm Jr.", Jody:"Kristian Robinson", "Matt W":"Jazz Chisholm Jr.", Josh:"Kristian Robinson", Mike:"Trayce Thompson", Bryan:"Jazz Chisholm Jr.", Sal:"Jazz Chisholm Jr.", Ben:"Jazz Chisholm Jr." }},
    { name:"Israel", flag:"🇮🇱", picks:{ Randy:"Matt Mervis", Jody:"Spencer Horwitz", "Matt W":"Harrison Bader", Josh:"Zach Levenson", Mike:"Spencer Horwitz", Bryan:"Harrison Bader", Sal:"Harrison Bader", Ben:"Matt Mervis" }},
    { name:"Italy", flag:"🇮🇹", picks:{ Randy:"Vinnie Pasquantino", Jody:"Jac Caglianone", "Matt W":"Vinnie Pasquantino", Josh:"Jon Berti", Mike:"Jac Caglianone", Bryan:"Vinnie Pasquantino", Sal:"Andrew Fisher", Ben:"Vinnie Pasquantino" }},
    { name:"Japan", flag:"🇯🇵", picks:{ Randy:"Munetaka Murakami", Jody:"Shohei Ohtani", "Matt W":"Shohei Ohtani", Josh:"Seiya Suzuki", Mike:"Shohei Ohtani", Bryan:"Shohei Ohtani", Sal:"Shohei Ohtani", Ben:"Shohei Ohtani" }},
    { name:"Korea", flag:"🇰🇷", picks:{ Randy:"Jung Hoo Lee", Jody:"Jung Hoo Lee", "Matt W":"Jung Hoo Lee", Josh:"Hyung Jun Kim", Mike:"Do Yeong Kim", Bryan:"Jung Hoo Lee", Sal:"Hyun-min Ahn", Ben:"Jung Hoo Lee" }},
    { name:"Mexico", flag:"🇲🇽", picks:{ Randy:"Rowdy Tellez", Jody:"Rowdy Tellez", "Matt W":"Randy Arozarena", Josh:"Randy Arozarena", Mike:"Randy Arozarena", Bryan:"Jarren Duran", Sal:"Randy Arozarena", Ben:"Randy Arozarena" }},
    { name:"Netherlands", flag:"🇳🇱", picks:{ Randy:"Ozzie Albies", Jody:"Druw Jones", "Matt W":"Xander Bogaerts", Josh:"Didi Gregorius", Mike:"Ozzie Albies", Bryan:"Xander Bogaerts", Sal:"Xander Bogaerts", Ben:"Ozzie Albies" }},
    { name:"Nicaragua", flag:"🇳🇮", picks:{ Randy:"Mark Vientos", Jody:"Mark Vientos", "Matt W":"Mark Vientos", Josh:"Chase Dawson", Mike:"Ismael Munguia", Bryan:"Mark Vientos", Sal:"Freddy Zamora", Ben:"Mark Vientos" }},
    { name:"Panama", flag:"🇵🇦", picks:{ Randy:"Jose Caballero", Jody:"Jose Ramos", "Matt W":"Jose Caballero", Josh:"Johan Camargo", Mike:"Edmundo Sosa", Bryan:"Jose Caballero", Sal:"Ivan Herrera", Ben:"Ivan Herrera" }},
    { name:"Puerto Rico", flag:"🇵🇷", picks:{ Randy:"Nolan Arenado", Jody:"Nolan Arenado", "Matt W":"Heliot Ramos", Josh:"Edwin Arroyo", Mike:"Willi Castro", Bryan:"Heliot Ramos", Sal:"Heliot Ramos", Ben:"Heliot Ramos" }},
    { name:"Venezuela", flag:"🇻🇪", picks:{ Randy:"Jackson Chourio", Jody:"Ronald Acuna Jr.", "Matt W":"Ronald Acuna Jr.", Josh:"William Contreras", Mike:"Jackson Chourio", Bryan:"Ronald Acuna Jr.", Sal:"Ronald Acuna Jr.", Ben:"Ronald Acuna Jr." }},
  ]
};

let statsData = { lastUpdated: null, players: {} };

async function loadStats() {
  try {
    const r = await fetch('./stats.json?t=' + Date.now());
    statsData = await r.json();
  } catch (e) { console.warn('stats.json not loaded:', e); }
  render();
}

function getStats(name) {
  return statsData.players?.[name] || { walks:0, singles:0, doubles:0, triples:0, homeRuns:0, rbi:0, runs:0, points:0 };
}

function calcTotals() {
  const totals = {};
  for (const p of PICKS.participants) totals[p] = 0;
  for (const c of PICKS.countries)
    for (const [p, player] of Object.entries(c.picks))
      totals[p] = (totals[p] || 0) + (getStats(player).points || 0);
  return totals;
}

function sv(val) {
  const v = val || 0;
  return `<span class="stat-val${v > 0 ? ' hi' : ''}">${v}</span>`;
}

function render() {
  const totals = calcTotals();
  const ranked = Object.entries(totals).sort((a, b) => b[1] - a[1]);
  const medals = ['🥇','🥈','🥉'];

  const lu = statsData.lastUpdated;
  document.getElementById('last-updated').textContent = lu
    ? 'Stats: ' + new Date(lu).toLocaleString('en-US', { timeZone:'America/Chicago', month:'short', day:'numeric', hour:'numeric', minute:'2-digit', hour12:true }) + ' CST'
    : 'Stats not yet updated';

  let html = '';

  // ── Leaderboard ──
  html += `<div class="card leaderboard">
    <div class="card-header"><span class="section-label">🏆 Leaderboard</span></div>
    <div class="leader-grid">`;
  ranked.forEach(([name, pts], i) => {
    const rc = i < 3 ? `rank-${i+1}` : '';
    html += `<div class="leader-card ${rc}">
      <span class="rank-badge">${medals[i] || '#'+(i+1)}</span>
      <div class="leader-name">${name}</div>
      <div class="leader-pts">${pts}</div>
      <div class="leader-pts-label">pts</div>
    </div>`;
  });
  html += `</div><div class="chalk-line"></div>
    <div class="scoring-key">
      <span class="section-label" style="margin-right:4px">Scoring:</span>
      <div class="score-items">
        <span class="score-item">Walk <strong>+1</strong></span>
        <span class="score-item">Single <strong>+1</strong></span>
        <span class="score-item">Double <strong>+2</strong></span>
        <span class="score-item">Triple <strong>+3</strong></span>
        <span class="score-item">HR <strong>+4</strong></span>
        <span class="score-item">RBI <strong>+1</strong></span>
        <span class="score-item">Run <strong>+1</strong></span>
      </div>
    </div>
  </div>`;

  // ── Countries ──
  for (const country of PICKS.countries) {
    html += `<div class="card country-section">
      <div class="card-header country-header">
        <span class="country-flag">${country.flag}</span>
        <span class="country-name">${country.name}</span>
      </div>
      <table class="country-table">
        <thead><tr>
          <th>Picker</th><th>Player</th>
          <th title="Walks">BB</th><th title="Singles">1B</th><th title="Doubles">2B</th>
          <th title="Triples">3B</th><th title="Home Runs">HR</th><th title="RBI">RBI</th>
          <th title="Runs">R</th><th title="Points">PTS</th>
        </tr></thead><tbody>`;

    for (const participant of PICKS.participants) {
      const player = country.picks[participant];
      const s = getStats(player);
      const pts = s.points || 0;
      html += `<tr>
        <td><span class="participant-name">${participant}</span></td>
        <td>${player}</td>
        <td>${sv(s.walks)}</td><td>${sv(s.singles)}</td><td>${sv(s.doubles)}</td>
        <td>${sv(s.triples)}</td><td>${sv(s.homeRuns)}</td><td>${sv(s.rbi)}</td><td>${sv(s.runs)}</td>
        <td><span class="pts-cell${pts===0?' zero':''}">${pts}</span></td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
  }

  document.getElementById('content').innerHTML = html;
}

loadStats();
setInterval(loadStats, 5 * 60 * 1000);
</script>
</body>
</html>
